[[plugin.prepend_fetchers]]
id   = "git"
name = "*"
run  = "git"

[[plugin.prepend_fetchers]]
id   = "git"
name = "*/"
run  = "git"

[opener]
scheme = [
    { run = 'fish -c "source ~/.config/fish/functions/scheme.fish; scheme -i \"$0\" -r matugen"', desc = "Set colorscheme (dark, matugen)", for = "unix" },
    { run = 'fish -c "source ~/.config/fish/functions/scheme.fish; scheme -li \"$0\" -r matugen"', desc = "Set colorscheme (light, matugen)", for = "unix" },
    { run = 'fish -c "source ~/.config/fish/functions/scheme.fish; scheme -i \"$0\" -r pywal"', desc = "Set colorscheme (dark, pywal)", for = "unix" },
    { run = 'fish -c "source ~/.config/fish/functions/scheme.fish; scheme -li \"$0\" -r pywal"' , desc = "Set colorscheme (light, pywal)", for = "unix" }
]

[open]
prepend_rules = [
    { name = "*.png", use = [ "scheme" ] },
    { name = "*.jpg", use = [ "scheme" ] },
    { name = "*.jpeg", use = [ "scheme" ] },
]

[preview]
max_width = 1000
max_height = 1000

[tasks]
image_bound = [ 10000, 10000 ]
